:root{--bg:#090b0e;--panel:#171b21;--edge:#45505b;--text:#f4f7fa;--muted:#9aa4ae;--green:#7f9982;--green2:#b8c7ba;--red:#a85f62;--amber:#c49a5b;--signal:var(--green);}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text)}
body{min-height:100svh;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:calc(12px + env(safe-area-inset-top)) 14px calc(18px + env(safe-area-inset-bottom));background:radial-gradient(circle at 50% -10%,rgba(127,153,130,.18),transparent 38%),repeating-linear-gradient(135deg,rgba(255,255,255,.018) 0 1px,transparent 1px 6px),linear-gradient(180deg,#11151a,#080a0c 75%)}
body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.24;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:22px 22px}
button{font:inherit;touch-action:manipulation}
.app{width:min(100%,520px);margin:auto}
.brand{display:flex;justify-content:space-between;align-items:flex-end;margin:0 4px 11px}
.logo{font-family:Bauhaus,"Arial Black",sans-serif;font-size:clamp(31px,8vw,43px);line-height:.9;color:var(--green2);text-shadow:0 2px 0 #000,0 0 15px rgba(184,199,186,.14)}
.logo span{color:#f5f7f5} .tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding-bottom:3px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px;border:1px solid #343c46;border-radius:16px;background:#0e1115;box-shadow:inset 0 0 0 1px #050607,0 8px 24px rgba(0,0,0,.55)}
.mode-tab{border:0;border-radius:11px;padding:11px;color:#8e99a5;background:transparent;font-weight:900;letter-spacing:.7px}
.mode-tab.active{color:#101511;border:1px solid #9eaaa0;background:linear-gradient(180deg,#aebcaf,#748d77);box-shadow:0 2px 0 #313a33,0 0 15px rgba(199,206,211,.12),inset 0 1px rgba(255,255,255,.35)}
.stage{position:relative;margin:13px 0;padding:15px;border-radius:27px;border:1px solid #45505b;background:linear-gradient(145deg,#262d35,#11151a 55%,#0d1014);box-shadow:inset 0 1px rgba(255,255,255,.08),inset 0 -20px 45px rgba(0,0,0,.28),0 18px 42px rgba(0,0,0,.55);overflow:hidden}
.phase{text-align:center;color:var(--signal);font-size:12px;font-weight:900;letter-spacing:3px;text-transform:uppercase}
.dial{--size:min(66vw,300px);width:var(--size);aspect-ratio:1;margin:8px auto 3px;border-radius:50%;padding:11px;background:conic-gradient(from 210deg,#303842,rgba(127,153,130,.75),#303842);box-shadow:0 0 0 2px rgba(199,206,211,.22),0 5px 0 rgba(70,78,74,.72),inset 0 0 18px #000;position:relative}
.dial-inner{width:100%;height:100%;border-radius:50%;display:grid;place-items:center;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 35%,#242b33,#0b0e12 72%);border:2px solid #0a0c0f;box-shadow:inset 0 0 42px #000,0 0 0 2px #515b66}
.wave{position:absolute;border:2px solid var(--signal);border-radius:50%;opacity:.17;animation:breathe 2.1s ease-in-out infinite}
.wave.w1{width:88%;height:88%} .wave.w2{width:65%;height:65%;animation-delay:.22s} .wave.w3{width:42%;height:42%;animation-delay:.44s}
.tuner-readout{position:relative;z-index:2;text-align:center} .note{font-family:Bauhaus,"Arial Black",sans-serif;font-size:clamp(68px,20vw,102px);line-height:.82;text-shadow:0 5px 18px #000} .cents{margin-top:11px;font-weight:900;font-size:16px;letter-spacing:1px;color:var(--signal)} .direction{margin-top:4px;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.meter{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin:7px 15px 0;color:#99a4ae;font-size:11px;font-weight:900;letter-spacing:1px} .meter-line{height:2px;background:linear-gradient(90deg,transparent,#596570)} .meter-line:last-child{transform:scaleX(-1)}
.panel{margin-bottom:11px;padding:13px;border:1px solid #343d47;border-radius:18px;background:linear-gradient(145deg,rgba(35,41,49,.94),rgba(15,18,23,.96));box-shadow:inset 0 1px rgba(255,255,255,.05),0 10px 24px rgba(0,0,0,.3)}
.panel-title{margin:0 0 10px;color:#aab4bd;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.strings{display:grid;gap:10px;padding:4px 0 2px}
.string-row{--thickness:9px;--offset:0%;position:relative;height:42px;display:flex;align-items:center}
.string{position:absolute;left:0;right:0;top:50%;height:var(--thickness);transform:translateY(-50%);border-radius:999px;background:repeating-linear-gradient(135deg,rgba(255,255,255,.38) 0 2px,rgba(72,91,75,.12) 2px 5px),linear-gradient(180deg,#bcc8be,#6f8872 47%,#405144 53%,#aab7ac);box-shadow:0 1px 0 rgba(255,255,255,.3),0 3px 7px rgba(0,0,0,.55);transform-origin:center}
.string-row.active .string{filter:brightness(1.28);box-shadow:0 0 13px rgba(174,188,175,.65),0 1px 0 rgba(255,255,255,.5)}
.string-row.plucked .string{animation:quiver .28s linear 1}
.string-row.listening .string{animation:liveQuiver .12s linear infinite}
.string-btn{position:relative;z-index:2;margin-left:var(--offset);width:47px;height:47px;border-radius:50%;border:1px solid #64716c;color:#eef3ef;font-family:Bauhaus,"Arial Black",sans-serif;font-size:23px;background:linear-gradient(180deg,#38423d,#171c19);box-shadow:0 3px 0 #0b0e0c,0 0 0 2px rgba(0,0,0,.35),inset 0 1px rgba(255,255,255,.16)}
.string-row.active .string-btn{color:#101511;background:linear-gradient(180deg,#c0cdc2,#748d77);box-shadow:0 3px 0 #303a32,0 0 16px rgba(174,188,175,.45),inset 0 1px rgba(255,255,255,.38)}
.controls{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:8px} .main-btn{min-height:55px;border-radius:14px;border:1px solid #4d5964;color:#cbd3da;font-weight:900;background:linear-gradient(180deg,#303943,#171c22);box-shadow:inset 0 1px rgba(255,255,255,.12),0 8px 16px rgba(0,0,0,.35)} .main-btn.primary{color:#101511;border-color:#9eaaa0;background:linear-gradient(180deg,#afbdaf,#708973);font-size:16px} .main-btn.active{box-shadow:0 0 18px rgba(174,188,175,.35),inset 0 1px rgba(255,255,255,.35)}
.help{text-align:center;color:#8f9aa4;font-size:11px;line-height:1.4;margin-top:10px}
@keyframes quiver{0%,100%{transform:translateY(-50%)}20%{transform:translateY(calc(-50% - 3px))}40%{transform:translateY(calc(-50% + 3px))}60%{transform:translateY(calc(-50% - 2px))}80%{transform:translateY(calc(-50% + 2px))}}
@keyframes liveQuiver{0%,100%{transform:translateY(-50%) scaleY(1)}50%{transform:translateY(calc(-50% + 1.5px)) scaleY(.88)}}
@keyframes breathe{50%{opacity:.38;transform:scale(.94)}}
@media(max-width:430px){.stage{padding:12px}.dial{--size:min(61vw,265px)}.strings{gap:7px}.string-row{height:38px}.string-btn{width:43px;height:43px;font-size:21px}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="app" id="app">
<header class="brand"><div class="logo">bill's <span>tune</span></div><div class="tag">guitar + bass tuner</div></header>
<nav class="mode-tabs"><button class="mode-tab active" data-mode="bass">Bass</button><button class="mode-tab" data-mode="guitar">Guitar</button></nav>
<section class="stage">
<div class="phase" id="phase">SELECT A STRING</div>
<div class="dial" id="dial"><div class="dial-inner"><span class="wave w1"></span><span class="wave w2"></span><span class="wave w3"></span><div class="tuner-readout"><div class="note" id="note">E</div><div class="cents" id="cents">— cents</div><div class="direction" id="direction">ready</div></div></div></div>
<div class="meter"><span class="meter-line"></span><span>FLAT &nbsp; • &nbsp; IN TUNE &nbsp; • &nbsp; SHARP</span><span class="meter-line"></span></div>
</section>
<section class="panel"><h2 class="panel-title" id="selectorTitle">Bass Strings</h2><div class="strings" id="strings"></div></section>
<div class="controls"><button class="main-btn" id="autoBtn">Auto</button><button class="main-btn primary" id="micBtn">Activate Mic</button><button class="main-btn" id="demoBtn">Demo</button></div>
<div class="help" id="help">Tap a string to select it. Demo shows the visual tuning motion without using the microphone.</div>
</main>
<script>
(()=>{
const configs={
 bass:[['E',41.20,12,2],['A',55.00,10,19],['D',73.42,8,37],['G',98.00,6,55]],
 guitar:[['E',82.41,10,0],['A',110.00,9,11],['D',146.83,8,22],['G',196.00,6,34],['B',246.94,4,46],['E',329.63,3,57]]
};
const NOTE_NAMES=['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const MANUAL_RANGE_CENTS=200; // two semitones below or above the selected string
let mode='bass',selected=0,micOn=false,demoTimer=null,audioCtx=null,analyser=null,source=null,stream=null,data=null;
let smoothFrequency=0,lastGoodPitchAt=0;
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const strings=$('#strings'),note=$('#note'),cents=$('#cents'),direction=$('#direction'),phase=$('#phase'),micBtn=$('#micBtn'),demoBtn=$('#demoBtn'),autoBtn=$('#autoBtn');

function renderStrings(){
  strings.innerHTML='';
  configs[mode].forEach((s,i)=>{
    const row=document.createElement('div');
    row.className='string-row'+(i===selected?' active':'');
    row.style.setProperty('--thickness',s[2]+'px');
    row.style.setProperty('--offset',s[3]+'%');
    row.innerHTML=`<div class="string"></div><button class="string-btn" aria-label="Select ${s[0]} string">${s[0]}</button>`;
    row.onclick=()=>selectString(i,true);
    strings.appendChild(row);
  });
  $('#selectorTitle').textContent=mode==='bass'?'Bass Strings':'Guitar Strings';
  showSelected();
}

function selectString(i,pluck){
  selected=i;
  smoothFrequency=0;
  $$('.string-row').forEach((r,n)=>r.classList.toggle('active',n===i));
  const row=$$('.string-row')[i];
  if(pluck){row.classList.remove('plucked');void row.offsetWidth;row.classList.add('plucked')}
  showSelected();
}

function showSelected(){
  const target=configs[mode][selected];
  note.textContent=target[0];
  cents.textContent=target[1].toFixed(2)+' Hz';
  direction.textContent=micOn?'listening…':'selected string';
  phase.textContent='PLAY THE '+target[0]+' STRING';
  document.documentElement.style.setProperty('--signal','var(--green)');
}

function frequencyToNote(freq){
  const midi=Math.round(69+12*Math.log2(freq/440));
  return {midi,name:NOTE_NAMES[(midi%12+12)%12],octave:Math.floor(midi/12)-1};
}

function updatePitch(freq,rms){
  const target=configs[mode][selected];
  const targetHz=target[1];
  const diffCents=1200*Math.log2(freq/targetHz);
  const rounded=Math.round(diffCents);
  const detected=frequencyToNote(freq);
  const inManualRange=Math.abs(diffCents)<=MANUAL_RANGE_CENTS;
  const row=$$('.string-row')[selected];
  row.classList.toggle('listening',rms>.025 && inManualRange);

  note.textContent=detected.name;
  cents.textContent=(rounded>0?'+':'')+rounded+' cents';
  phase.textContent='TARGET '+target[0]+'  •  HEARD '+detected.name+detected.octave;

  if(!inManualRange){
    direction.textContent=rounded<0?'too low — tighten toward '+target[0]:'too high — loosen toward '+target[0];
    document.documentElement.style.setProperty('--signal','#a85f62');
    return;
  }

  if(Math.abs(rounded)<=4){
    direction.textContent='in tune';
    phase.textContent='LOCKED IN TUNE';
    document.documentElement.style.setProperty('--signal','#8fb394');
  }else if(rounded<0){
    direction.textContent='flat — tighten string';
    document.documentElement.style.setProperty('--signal',Math.abs(rounded)<=18?'#c49a5b':'#a85f62');
  }else{
    direction.textContent='sharp — loosen string';
    document.documentElement.style.setProperty('--signal',Math.abs(rounded)<=18?'#c49a5b':'#a85f62');
  }
}

function demo(){
  clearInterval(demoTimer);
  demoBtn.classList.add('active');
  let t=0;
  const target=configs[mode][selected][1];
  demoTimer=setInterval(()=>{
    t++;
    const fakeCents=Math.round(Math.sin(t/3)*170*(1-Math.min(t,58)/70));
    const fakeFreq=target*Math.pow(2,fakeCents/1200);
    updatePitch(fakeFreq,.08);
    if(t>70){
      clearInterval(demoTimer);
      $$('.string-row')[selected].classList.remove('listening');
      demoBtn.classList.remove('active');
      updatePitch(target,.08);
    }
  },90);
}

function autoCorrelate(buffer,sampleRate,targetHz){
  let rms=0;
  for(let i=0;i<buffer.length;i++)rms+=buffer[i]*buffer[i];
  rms=Math.sqrt(rms/buffer.length);
  if(rms<.012)return {frequency:-1,rms};

  const minHz=targetHz*Math.pow(2,-MANUAL_RANGE_CENTS/1200);
  const maxHz=targetHz*Math.pow(2, MANUAL_RANGE_CENTS/1200);
  const minLag=Math.max(2,Math.floor(sampleRate/maxHz));
  const maxLag=Math.min(buffer.length-2,Math.ceil(sampleRate/minHz));
  let bestLag=-1,bestCorrelation=0;

  for(let lag=minLag;lag<=maxLag;lag++){
    let correlation=0,normA=0,normB=0;
    const limit=buffer.length-lag;
    for(let i=0;i<limit;i++){
      const a=buffer[i],b=buffer[i+lag];
      correlation+=a*b;normA+=a*a;normB+=b*b;
    }
    correlation/=Math.sqrt(normA*normB)||1;
    if(correlation>bestCorrelation){bestCorrelation=correlation;bestLag=lag;}
  }
  if(bestLag<0||bestCorrelation<.72)return {frequency:-1,rms};

  // Parabolic interpolation around the best lag improves cents accuracy.
  const corrAt=lag=>{
    let c=0,a2=0,b2=0,limit=buffer.length-lag;
    for(let i=0;i<limit;i++){const a=buffer[i],b=buffer[i+lag];c+=a*b;a2+=a*a;b2+=b*b;}
    return c/(Math.sqrt(a2*b2)||1);
  };
  const left=bestLag>minLag?corrAt(bestLag-1):bestCorrelation;
  const right=bestLag<maxLag?corrAt(bestLag+1):bestCorrelation;
  const denom=left-2*bestCorrelation+right;
  const shift=Math.abs(denom)>.0001?.5*(left-right)/denom:0;
  return {frequency:sampleRate/(bestLag+Math.max(-.5,Math.min(.5,shift))),rms};
}

async function toggleMic(){
  if(micOn){
    micOn=false;
    micBtn.textContent='Activate Mic';
    micBtn.classList.remove('active');
    try{source?.disconnect()}catch(e){}
    stream?.getTracks().forEach(t=>t.stop());
    try{await audioCtx?.close()}catch(e){}
    audioCtx=analyser=source=stream=data=null;
    $$('.string-row').forEach(r=>r.classList.remove('listening'));
    phase.textContent='MICROPHONE OFF';
    direction.textContent='tap Activate Mic to continue';
    return;
  }
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=8192;
    analyser.smoothingTimeConstant=.15;
    source=audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);
    data=new Float32Array(analyser.fftSize);
    micOn=true;
    micBtn.textContent='Mic Active';
    micBtn.classList.add('active');
    phase.textContent='PLAY THE '+configs[mode][selected][0]+' STRING';
    direction.textContent='listening…';
    listenPitch();
  }catch(e){
    phase.textContent='MICROPHONE NOT AVAILABLE';
    direction.textContent='permission required';
  }
}

function listenPitch(){
  if(!micOn||!analyser||!audioCtx)return;
  analyser.getFloatTimeDomainData(data);
  const targetHz=configs[mode][selected][1];
  const result=autoCorrelate(data,audioCtx.sampleRate,targetHz);
  const row=$$('.string-row')[selected];

  if(result.frequency>0){
    smoothFrequency=smoothFrequency?smoothFrequency*.72+result.frequency*.28:result.frequency;
    lastGoodPitchAt=performance.now();
    updatePitch(smoothFrequency,result.rms);
  }else if(performance.now()-lastGoodPitchAt>350){
    row.classList.remove('listening');
    note.textContent=configs[mode][selected][0];
    cents.textContent='listening…';
    direction.textContent=result.rms>.012?'sound heard — finding note':'play the selected string';
    phase.textContent='TARGET '+configs[mode][selected][0];
    document.documentElement.style.setProperty('--signal','var(--green)');
  }
  requestAnimationFrame(listenPitch);
}

$$('.mode-tab').forEach(b=>b.onclick=()=>{
  mode=b.dataset.mode;selected=0;smoothFrequency=0;
  $$('.mode-tab').forEach(x=>x.classList.toggle('active',x===b));
  renderStrings();
});
micBtn.onclick=toggleMic;
demoBtn.onclick=demo;
autoBtn.onclick=()=>{
  autoBtn.classList.toggle('active');
  autoBtn.textContent=autoBtn.classList.contains('active')?'Manual Wide':'Manual';
  direction.textContent='manual range: two semitones each side';
};
autoBtn.textContent='Manual';
renderStrings();
})();
</script>
</body></html>
